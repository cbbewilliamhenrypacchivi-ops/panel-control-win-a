<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa del Sitio Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background: linear-gradient(135deg, #EBE4DA 0%, #f5f1eb 100%);
            color: #1D1D1B;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1D1D1B 0%, #808BC5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            background: white;
            border: 2px solid #1D1D1B;
            padding: 12px 24px;
            cursor: pointer;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.4s ease-out;
            text-decoration: none;
            color: #1D1D1B;
        }

        .back-btn:hover {
            background: #808BC5;
            border-color: #808BC5;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(128, 139, 197, 0.3);
        }

        .content {
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .section {
            background: white;
            border: 2px solid #1D1D1B;
            padding: 40px;
            margin-bottom: 30px;
            transition: all 0.4s ease-out;
        }

        .section:hover {
            border-color: #808BC5;
            box-shadow: 0 10px 30px rgba(128, 139, 197, 0.15);
            transform: translateY(-5px);
        }

        .section h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #808BC5;
            font-weight: 700;
        }

        .section p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #1D1D1B;
            margin-bottom: 15px;
        }

        .sitemap-tree {
            margin-top: 25px;
            padding-left: 20px;
        }

        .tree-item {
            margin: 12px 0;
            padding: 12px 15px;
            border-left: 3px solid #808BC5;
            background: #f5f1eb;
            transition: all 0.3s ease-out;
            animation: fadeInLeft 0.6s ease-out backwards;
        }

        .tree-item:nth-child(1) { animation-delay: 0.1s; }
        .tree-item:nth-child(2) { animation-delay: 0.2s; }
        .tree-item:nth-child(3) { animation-delay: 0.3s; }
        .tree-item:nth-child(4) { animation-delay: 0.4s; }
        .tree-item:nth-child(5) { animation-delay: 0.5s; }
        .tree-item:nth-child(6) { animation-delay: 0.6s; }
        .tree-item:nth-child(7) { animation-delay: 0.7s; }
        .tree-item:nth-child(8) { animation-delay: 0.8s; }

        .tree-item:hover {
            background: #EBE4DA;
            transform: translateX(8px);
            border-left-color: #1D1D1B;
        }

        .tree-level {
            font-weight: 600;
            color: #1D1D1B;
        }

        .tree-link {
            color: #808BC5;
            font-weight: 500;
        }

        .hierarchy {
            margin-top: 25px;
            padding: 20px;
            background: #f5f1eb;
            border-left: 4px solid #808BC5;
        }

        .hierarchy h3 {
            margin-bottom: 10px;
            color: #1D1D1B;
        }

        .hierarchy p {
            font-size: 1rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            h1 {
                font-size: 2rem;
            }

            .section {
                padding: 25px;
            }
        }
        /* Modal de imagen (zoom) */
        .img-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 9999;
        }

        .img-modal.is-open {
            display: flex;
        }

        .img-modal__dialog {
            position: relative;
            width: min(1100px, 100%);
            max-height: 90vh;
            background: #f5f1eb;
            border: 2px solid #1D1D1B;
            border-radius: 14px;
            overflow: hidden;
        }

        .img-modal__bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            background: #EBE4DA;
            border-bottom: 2px solid #1D1D1B;
        }

        .img-modal__title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1D1D1B;
        }

        .img-modal__actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .img-modal__btn {
            border: 2px solid #1D1D1B;
            background: #fff;
            color: #1D1D1B;
            font-weight: 700;
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .img-modal__btn:hover {
            transform: translateY(-1px);
        }

        .img-modal__viewport {
            padding: 14px;
            overflow: auto;
            max-height: calc(90vh - 56px);
            background: #f5f1eb;
        }

        .img-modal__img {
            display: block;
            width: 100%;
            height: auto;
            transform-origin: top left;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Mapa del Sitio Web</h1>
            <a href="index.html" class="back-btn">← Volver</a>
        </header>

        <div class="content">
            <div class="section">
                <h2>🗺️ Estructura del Sitio</h2>
                <p>El mapa del sitio presenta la jerarquía y organización de todas las páginas del proyecto integrador:</p>
                <div style="margin-top: 25px; text-align: center; animation: fadeInUp 0.8s ease-out 0.2s backwards;">
                    <div style="display: inline-block; width: 100%;">
                        <img class="zoomable" src="img/WIN_A_mapa-de-sitio.png" alt="Mapa de Sitio" data-modal-title="Mapa del Sitio Web (clic para ampliar)" style="max-width: 100%; height: auto; border: 2px solid #1D1D1B; transition: all 0.4s ease-out; cursor: zoom-in;" onmouseover="this.style.boxShadow='0 10px 30px rgba(128, 139, 197, 0.25)'" onmouseout="this.style.boxShadow='none'">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal de imagen -->
    <div class="img-modal" id="imgModal" aria-hidden="true">
        <div class="img-modal__dialog" role="dialog" aria-modal="true" aria-label="Vista ampliada de imagen">
            <div class="img-modal__bar">
                <div class="img-modal__title" id="imgModalTitle">Imagen</div>
                <div class="img-modal__actions">
                    <button type="button" class="img-modal__btn" id="imgZoomOut" aria-label="Disminuir zoom">-</button>
                    <button type="button" class="img-modal__btn" id="imgZoomReset" aria-label="Restablecer zoom">100%</button>
                    <button type="button" class="img-modal__btn" id="imgZoomIn" aria-label="Aumentar zoom">+</button>
                    <button type="button" class="img-modal__btn" id="imgModalClose" aria-label="Cerrar">Cerrar</button>
                </div>
            </div>
            <div class="img-modal__viewport" id="imgModalViewport">
                <img class="img-modal__img" id="imgModalImg" alt="">
            </div>
        </div>
    </div>

    <script>
        (function () {
            const modal = document.getElementById('imgModal');
            const modalImg = document.getElementById('imgModalImg');
            const modalTitle = document.getElementById('imgModalTitle');
            const viewport = document.getElementById('imgModalViewport');
            const btnClose = document.getElementById('imgModalClose');
            const btnIn = document.getElementById('imgZoomIn');
            const btnOut = document.getElementById('imgZoomOut');
            const btnReset = document.getElementById('imgZoomReset');

            let zoom = 1;
            const ZOOM_MIN = 1;
            const ZOOM_MAX = 3;
            const ZOOM_STEP = 0.2;

            function applyZoom() {
                modalImg.style.transform = `scale(${zoom})`;
                btnReset.textContent = `${Math.round(zoom * 100)}%`;
            }

            function openModal(imgEl) {
                const src = imgEl.getAttribute('data-full-src') || imgEl.getAttribute('src');
                const title = imgEl.getAttribute('data-modal-title') || imgEl.getAttribute('alt') || 'Imagen';

                modalImg.src = src;
                modalImg.alt = imgEl.getAttribute('alt') || 'Imagen ampliada';
                modalTitle.textContent = title;

                zoom = 1.6; /* escala inicial para ver detalles */
                applyZoom();
                viewport.scrollTop = 0;
                viewport.scrollLeft = 0;

                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                modalImg.removeAttribute('src');
            }

            document.querySelectorAll('img.zoomable').forEach((img) => {
                img.addEventListener('click', () => openModal(img));
            });

            btnClose.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            btnIn.addEventListener('click', () => {
                zoom = Math.min(ZOOM_MAX, +(zoom + ZOOM_STEP).toFixed(2));
                applyZoom();
            });

            btnOut.addEventListener('click', () => {
                zoom = Math.max(ZOOM_MIN, +(zoom - ZOOM_STEP).toFixed(2));
                applyZoom();
            });

            btnReset.addEventListener('click', () => {
                zoom = 1;
                applyZoom();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
            });
        })();
    </script>
</body>
</html>
