<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagramación y Maquetación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background: linear-gradient(135deg, #EBE4DA 0%, #f5f1eb 100%);
            color: #1D1D1B;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1D1D1B 0%, #808BC5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            background: white;
            border: 2px solid #1D1D1B;
            padding: 12px 24px;
            cursor: pointer;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.4s ease-out;
            text-decoration: none;
            color: #1D1D1B;
        }

        .back-btn:hover {
            background: #808BC5;
            border-color: #808BC5;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(128, 139, 197, 0.3);
        }

        .content {
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .section {
            background: white;
            border: 2px solid #1D1D1B;
            padding: 40px;
            margin-bottom: 30px;
            transition: all 0.4s ease-out;
        }

        .section:hover {
            border-color: #808BC5;
            box-shadow: 0 10px 30px rgba(128, 139, 197, 0.15);
            transform: translateY(-5px);
        }

        .section h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #808BC5;
            font-weight: 700;
        }

        .section p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #1D1D1B;
            margin-bottom: 15px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 25px;
        }

        .layout-item {
            border: 2px solid #1D1D1B;
            padding: 20px;
            text-align: center;
            transition: all 0.4s ease-out;
            animation: fadeInUp 0.6s ease-out backwards;
            background: #f5f1eb;
        }

        .layout-item:nth-child(1) { animation-delay: 0.1s; }
        .layout-item:nth-child(2) { animation-delay: 0.2s; }
        .layout-item:nth-child(3) { animation-delay: 0.3s; }
        .layout-item:nth-child(4) { animation-delay: 0.4s; }

        .layout-item:hover {
            background: white;
            border-color: #808BC5;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(128, 139, 197, 0.2);
        }

        .layout-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .layout-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1D1D1B;
            margin-bottom: 8px;
        }

        .layout-desc {
            font-size: 0.95rem;
            color: #808BC5;
            line-height: 1.5;
        }

        .principles {
            margin-top: 25px;
        }

        .principle-item {
            background: #f5f1eb;
            border-left: 4px solid #808BC5;
            padding: 15px;
            margin: 12px 0;
            transition: all 0.3s ease-out;
            animation: fadeInLeft 0.6s ease-out backwards;
        }

        .principle-item:nth-child(1) { animation-delay: 0.1s; }
        .principle-item:nth-child(2) { animation-delay: 0.2s; }
        .principle-item:nth-child(3) { animation-delay: 0.3s; }
        .principle-item:nth-child(4) { animation-delay: 0.4s; }

        .principle-item:hover {
            background: #EBE4DA;
            transform: translateX(8px);
            border-left-color: #1D1D1B;
        }

        .principle-title {
            font-weight: 700;
            color: #1D1D1B;
            margin-bottom: 5px;
        }

        .principle-desc {
            font-size: 0.95rem;
            color: #808BC5;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            h1 {
                font-size: 2rem;
            }

            .section {
                padding: 25px;
            }

            .grid-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Diagramación y Maquetación</h1>
            <a href="index.html" class="back-btn">← Volver</a>
        </header>

        <div class="content">
            <div class="section">
                <h2>📐 Wireframes del Proyecto</h2>
                <p>Presentación de los wireframes estructurales para cada sección del sitio web:</p>
            </div>

            <div class="section">
                <h2>1. 📄 Página Principal (Index)</h2>
                <div style="margin-top: 25px; text-align: center; animation: fadeInUp 0.6s ease-out 0.1s backwards;">
                    <img src="img/index.jpg" alt="Wireframe - Index" style="max-width: 100%; height: auto; border: 2px solid #1D1D1B; transition: all 0.4s ease-out; cursor: pointer;" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 10px 30px rgba(128, 139, 197, 0.25)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'">
                </div>
            </div>

            <div class="section">
                <h2>2. ℹ️ Sobre Nosotros</h2>
                <div style="margin-top: 25px; text-align: center; animation: fadeInUp 0.6s ease-out 0.2s backwards;">
                    <img src="img/sobre-nosotros.jpg" alt="Wireframe - Sobre Nosotros" style="max-width: 100%; height: auto; border: 2px solid #1D1D1B; transition: all 0.4s ease-out; cursor: pointer;" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 10px 30px rgba(128, 139, 197, 0.25)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'">
                </div>
            </div>

            <div class="section">
                <h2>3. 🏆 Nuestros Trabajos</h2>
                <div style="margin-top: 25px; text-align: center; animation: fadeInUp 0.6s ease-out 0.3s backwards;">
                    <img src="img/nuestros-trabajos.jpg" alt="Wireframe - Nuestros Trabajos" style="max-width: 100%; height: auto; border: 2px solid #1D1D1B; transition: all 0.4s ease-out; cursor: pointer;" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 10px 30px rgba(128, 139, 197, 0.25)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'">
                </div>
            </div>

            <div class="section">
                <h2>4. 🛠️ Servicios</h2>
                <div style="margin-top: 25px; text-align: center; animation: fadeInUp 0.6s ease-out 0.4s backwards;">
                    <img src="img/servicios.jpg" alt="Wireframe - Servicios" style="max-width: 100%; height: auto; border: 2px solid #1D1D1B; transition: all 0.4s ease-out; cursor: pointer;" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 10px 30px rgba(128, 139, 197, 0.25)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'">
                </div>
            </div>

            <div class="section">
                <h2>5. ❓ Preguntas Frecuentes</h2>
                <div style="margin-top: 25px; text-align: center; animation: fadeInUp 0.6s ease-out 0.5s backwards;">
                    <img src="img/preguntas-frecuentes.jpg" alt="Wireframe - Preguntas Frecuentes" style="max-width: 100%; height: auto; border: 2px solid #1D1D1B; transition: all 0.4s ease-out; cursor: pointer;" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 10px 30px rgba(128, 139, 197, 0.25)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'">
                </div>
            </div>

            <div class="section">
                <h2>6. 📧 Contactos</h2>
                <div style="margin-top: 25px; text-align: center; animation: fadeInUp 0.6s ease-out 0.6s backwards;">
                    <img src="img/contacto.jpg" alt="Wireframe - Contactos" style="max-width: 100%; height: auto; border: 2px solid #1D1D1B; transition: all 0.4s ease-out; cursor: pointer;" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 10px 30px rgba(128, 139, 197, 0.25)'" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none'">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
